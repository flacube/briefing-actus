<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>News & Actus</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      background: #0f1117;
      color: #e8eaf0;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    body.light { background: #f0f2f7; color: #1a1d2e; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      background: #1a1d2e;
      border-bottom: 1px solid #2a2d3e;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 10px;
    }

    body.light header { background: #ffffff; border-color: #dde2ee; }

    .logo { font-size: 1.2rem; font-weight: 700; color: #3d8ef8; }

    .header-right { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }

    #lastUpdate { font-size: 0.78rem; color: #8892a4; }

    #toggleMode {
      background: #22263a;
      color: #e8eaf0;
      border: 1px solid #2a2d3e;
      padding: 7px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.82rem;
      transition: all 0.2s;
    }

    body.light #toggleMode { background: #e8eaf0; color: #1a1d2e; border-color: #dde2ee; }
    #toggleMode:hover { background: #3d8ef8; color: #fff; }

    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* CARTE */
    .card {
      background: #1a1d2e;
      border: 1px solid #2a2d3e;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    body.light .card { background: #ffffff; border-color: #dde2ee; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #8892a4;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #2a2d3e;
    }

    body.light .card h2 { border-color: #dde2ee; }

    /* RÉSUMÉ IA */
    .resume-ia {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #e8eaf0;
      min-height: 60px;
    }

    body.light .resume-ia { color: #1a1d2e; }

    .resume-loading {
      color: #8892a4;
      font-style: italic;
      font-size: 0.9rem;
    }

    .ia-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 12px;
    }

    /* GRILLE JOURNAUX */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    /* ARTICLES */
    .news-list { display: flex; flex-direction: column; }

    .news-item {
      padding: 12px 0;
      border-bottom: 1px solid #2a2d3e;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    body.light .news-item { border-color: #dde2ee; }
    .news-item:first-child { padding-top: 0; }
    .news-item:last-child { border-bottom: none; padding-bottom: 0; }

    .news-titre {
      font-size: 0.88rem;
      color: #e8eaf0;
      line-height: 1.45;
      font-weight: 600;
      text-decoration: none;
      display: block;
    }

    body.light .news-titre { color: #1a1d2e; }
    .news-titre:hover { color: #3d8ef8; }

    .news-resume {
      font-size: 0.80rem;
      color: #8892a4;
      line-height: 1.4;
    }

    body.light .news-resume { color: #5a6478; }

    .news-date {
      font-size: 0.70rem;
      color: #5a6478;
    }

    /* BOUTON AFFICHER PLUS */
    .btn-more {
      margin-top: 12px;
      background: none;
      border: 1px solid #2a2d3e;
      color: #3d8ef8;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      width: 100%;
      transition: all 0.2s;
    }

    body.light .btn-more { border-color: #dde2ee; }
    .btn-more:hover { background: #3d8ef8; color: #fff; }

    /* RESPONSIVE */
    @media (max-width: 900px) { .news-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="dark">

  <header>
    <span class="logo">📰 News & Actus</span>
    <div class="header-right">
      <span id="lastUpdate">Chargement...</span>
      <button id="toggleMode" onclick="toggleMode()">☀️ Mode clair</button>
    </div>
  </header>

  <main>

    <!-- RÉSUMÉ IA -->
    <div class="card">
      <h2>🤖 Résumé de l'actualité</h2>
      <div class="ia-badge">✨ Généré par IA</div>
      <div class="resume-ia" id="resumeIA">
        <span class="resume-loading">Analyse de l'actualité en cours...</span>
      </div>
    </div>

    <!-- JOURNAUX -->
    <div class="news-grid">
      <div class="card">
        <h2>🔵 Le Monde</h2>
        <div class="news-list" id="newsMonde">Chargement...</div>
      </div>
      <div class="card">
        <h2>🟠 Sud Ouest</h2>
        <div class="news-list" id="newsSudOuest">Chargement...</div>
      </div>
      <div class="card">
        <h2>🟢 Courrier International</h2>
        <div class="news-list" id="newsCourrier">Chargement...</div>
      </div>
    </div>

  </main>

  <script>
    const RSS_PROXY   = "https://api.rss2json.com/v1/api.json?rss_url=";
    const GEMINI_API  = "https://news-api-two-drab.vercel.app/api/gemini";
    const ACTUALISATION = 6 * 60 * 60 * 1000; // 6 heures

    const SOURCES = {
      monde:    { url: "https://www.lemonde.fr/rss/une.xml",                    id: "newsMonde"    },
      sudouest: { url: "https://www.sudouest.fr/rss.xml",                       id: "newsSudOuest" },
      courrier: { url: "https://www.courrierinternational.com/feed/all/rss.xml", id: "newsCourrier" }
    };

    let tousLesArticles = [];

    // ============================================================
    // INITIALISATION
    // ============================================================
    document.addEventListener("DOMContentLoaded", async () => {
      await chargerTout();
      setInterval(chargerTout, ACTUALISATION);
    });

    async function chargerTout() {
      tousLesArticles = [];
      await Promise.all(Object.values(SOURCES).map(s => chargerFlux(s)));
      await genererResumeIA();
      const now = new Date();
      document.getElementById("lastUpdate").textContent =
        "Mise à jour : " + now.toLocaleTimeString("fr-FR");
    }

    // ============================================================
    // FLUX RSS
    // ============================================================
    async function chargerFlux(source) {
      const conteneur = document.getElementById(source.id);
      try {
        const resp = await fetch(RSS_PROXY + encodeURIComponent(source.url));
        const data = await resp.json();

        if (!data.items || !data.items.length) {
          conteneur.innerHTML = "<p style='color:#8892a4;font-size:0.85rem'>Aucun article disponible.</p>";
          return;
        }

        const articles = data.items.map(item => ({
          titre:   item.title,
          lien:    item.link,
          resume:  item.description ? nettoyer(item.description) : "",
          date:    item.pubDate
        }));

        // Collecter les titres pour le résumé IA
        articles.slice(0, 10).forEach(a => tousLesArticles.push(a.titre));

        afficherArticles(conteneur, articles, source.id);
      } catch (e) {
        conteneur.innerHTML = "<p style='color:#8892a4;font-size:0.85rem'>Erreur de chargement.</p>";
      }
    }

    function nettoyer(html) {
      const div = document.createElement("div");
      div.innerHTML = html;
      const texte = div.textContent || div.innerText || "";
      return texte.trim().slice(0, 180) + (texte.length > 180 ? "…" : "");
    }

    function afficherArticles(conteneur, articles, sourceId) {
      const visibles = articles.slice(0, 5);
      const cachees  = articles.slice(5);

      const htmlVisibles = visibles.map(a => renderArticle(a)).join("");
      const htmlCachees  = cachees.length > 0
        ? `<div id="more-${sourceId}" style="display:none">
             ${cachees.map(a => renderArticle(a)).join("")}
           </div>
           <button class="btn-more" onclick="afficherPlus('${sourceId}')">
             ▼ Afficher plus (${cachees.length})
           </button>`
        : "";

      conteneur.innerHTML = htmlVisibles + htmlCachees;
    }

    function renderArticle(a) {
      return `
        <div class="news-item">
          <a class="news-titre" href="${a.lien}" target="_blank" rel="noopener">${a.titre}</a>
          ${a.resume ? `<div class="news-resume">${a.resume}</div>` : ""}
          <div class="news-date">${formaterDate(a.date)}</div>
        </div>`;
    }

    function afficherPlus(sourceId) {
      const more = document.getElementById("more-" + sourceId);
      const btn  = more.nextElementSibling;
      if (more.style.display === "none") {
        more.style.display = "block";
        btn.textContent = "▲ Afficher moins";
      } else {
        more.style.display = "none";
        btn.textContent = `▼ Afficher plus (${more.querySelectorAll(".news-item").length})`;
      }
    }

    function formaterDate(dateStr) {
      try {
        const d = new Date(dateStr);
        return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" });
      } catch { return ""; }
    }

    // ============================================================
    // RÉSUMÉ IA
    // ============================================================
    async function genererResumeIA() {
      const el = document.getElementById("resumeIA");
      if (!tousLesArticles.length) {
        el.innerHTML = "<span class='resume-loading'>Aucun titre disponible pour générer un résumé.</span>";
        return;
      }

      try {
        const resp = await fetch(GEMINI_API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ titres: tousLesArticles.slice(0, 20) })
        });

        const data = await resp.json();
        if (data.resume) {
          el.textContent = data.resume;
        } else {
          el.innerHTML = "<span class='resume-loading'>Résumé temporairement indisponible.</span>";
        }
      } catch (e) {
        el.innerHTML = "<span class='resume-loading'>Résumé temporairement indisponible.</span>";
      }
    }

    // ============================================================
    // MODE CLAIR / SOMBRE
    // ============================================================
    function toggleMode() {
      const body = document.body;
      const btn  = document.getElementById("toggleMode");
      if (body.classList.contains("dark")) {
        body.classList.replace("dark", "light");
        btn.textContent = "🌙 Mode sombre";
      } else {
        body.classList.replace("light", "dark");
        btn.textContent = "☀️ Mode clair";
      }
    }
  </script>

</body>
</html>
